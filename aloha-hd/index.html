<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ALOHA SUMO HD — Hōshōryū at Waikiki</title>
<style>
* { margin:0; padding:0; }
html,body { width:100%; height:100%; overflow:hidden; background:#0a1622;
  font-family:"Avenir Next","Segoe UI",sans-serif; }
#c { position:fixed; inset:0; width:100%; height:100%; }
.chip { position:fixed; z-index:10; color:#fff; background:rgba(10,20,35,.55);
  backdrop-filter:blur(10px); border:1px solid rgba(255,255,255,.18);
  border-radius:999px; padding:9px 18px; font-size:14px;
  text-shadow:0 1px 3px rgba(0,0,0,.5); }
#title { top:14px; left:14px; font-weight:700; }
#title span { font-weight:400; opacity:.75; font-size:12px; margin-left:8px; }
#hint { bottom:14px; right:14px; font-size:12.5px; }
#hint b { color:#ffd166; }
#load { position:fixed; inset:0; z-index:50; display:flex; align-items:center;
  justify-content:center; color:#fff; background:#0a1622; font-size:18px;
  letter-spacing:2px; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="title" class="chip">🌺 ALOHA SUMO HD<span>Hōshōryū · Waikiki Village Resort</span></div>
<div id="hint" class="chip"><b>WASD</b> walk · <b>SHIFT</b> run · <b>drag</b> look · <b>scroll</b> zoom</div>
<div id="load">LANDING IN HONOLULU…</div>
<script src="bundle.js"></script>
</body>
</html>
